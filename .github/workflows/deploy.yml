name: Deploy to VPS with PM2

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  APP_NAME: "divya-sadhana-admin-frontend"
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Discord - Build Started
        uses: sarisia/actions-status-discord@v1
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          title: "🚀 Admin Panel Deployment Started"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
          color: 0x0099ff

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.VPS_PORT }}
          SSH_USER: ${{ secrets.VPS_USER }}
          APP_DIRECTORY: ${{ secrets.APP_DIRECTORY }}
        run: |
          install -m 700 -d ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key

          SSH_OPTS=(
            -i ~/.ssh/deploy_key
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout=120
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=10
            -p "$SSH_PORT"
          )

          REMOTE_SCRIPT=$(printf '%s\n' \
            'set -euo pipefail' \
            'echo "🔄 Starting deployment on VPS..."' \
            'cd "$APP_DIRECTORY" || { echo "❌ Failed to navigate"; exit 1; }' \
            'echo "📥 Pulling latest code..."' \
            'git fetch origin master' \
            'git reset --hard origin/master' \
            'echo "📦 Installing dependencies..."' \
            'rm -rf node_modules .next' \
            'npm ci || { echo "❌ Install failed"; exit 1; }' \
            'echo "🔨 Building project..."' \
            'npm run build || { echo "❌ Build failed"; exit 1; }' \
            'echo "🚀 Restarting PM2 (preserves PORT=3001 from ecosystem.config.js)..."' \
            'pm2 startOrReload ecosystem.config.js --update-env || pm2 start ecosystem.config.js' \
            'pm2 save' \
            'echo "✅ Deployment completed successfully!"')

          deploy() {
            ssh "${SSH_OPTS[@]}" "$SSH_USER@$SSH_HOST" \
              "APP_DIRECTORY=$(printf '%q' "$APP_DIRECTORY") bash -s" <<< "$REMOTE_SCRIPT"
          }

          for attempt in 1 2 3; do
            echo "🚀 Deploy attempt $attempt/3..."
            if deploy; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "⏳ SSH deploy failed, retrying in 30s..."
              sleep 30
            fi
          done

          echo "❌ Deployment failed after 3 SSH attempts"
          exit 1

      - name: Notify Discord - Deployment Success
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          title: "✅ Admin Panel Deployment Successful"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}

            Admin panel is now live on https://admin.divyasadhana.org (PM2 port 3001)!
          color: 0x00ff00

      - name: Notify Discord - Deployment Failed
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          title: "❌ Admin Panel Deployment Failed"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **Run ID:** ${{ github.run_id }}

            Check the logs for more details.
          color: 0xff0000
